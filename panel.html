<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UbicaMed Panel</title>

  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

  <div class="background-layer"></div>
  <div class="overlay"></div>

  <!-- PANEL LATERAL -->
  <aside class="user-panel" id="userPanel">
    <div class="panel-header"></div>

    <div class="user-section">
      <i class="fa-solid fa-user"></i>
      <div class="user-info">
        <p class="user-name" id="userName">Usuario</p>
        <p class="user-email" id="userEmail">usuario@email.com</p>
      </div>
    </div>

    <nav class="menu">
      <ul>
        <li><i class="fa-solid fa-pen-to-square"></i> Actualizar datos</li>
        <li id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</li>
      </ul>
    </nav>
  </aside>

  <!-- CONTENIDO -->
  <main class="panel-main">

    <header class="panel-topbar">
      <div class="location">
        <i class="fa-solid fa-location-dot"></i> Bogotá
      </div>

      <div class="logo-container">
        <img src="images/logo.png" class="logo-icon">
        <span>UbicaMed</span>
      </div>
    </header>

    <section class="content">

      <h1>Buscar hospitales cercanos</h1>
      <p class="subtitle">
        Consulta los hospitales más cercanos según tu EPS y tu ubicación actual.
      </p>

      <!-- 🔹 BUSQUEDA -->
      <div class="panel-search-card" id="searchCard">
        <label for="eps">Tu EPS</label>
        <select id="eps"></select>

        <button id="buscarBtn">
          <i class="fa-solid fa-magnifying-glass"></i>
          Buscar
        </button>

        <p id="result-text"></p>
      </div>

      <!-- 🔹 MAPA -->
      <div id="map-container" style="display:none;">

        <div id="map"></div>

        <div id="hospital-info"></div>

        <button id="volverBusqueda" class="btn-volver" style="display:none;">
           Volver a buscar
        </button>

      </div>

    </section>

  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="js/views/principal.js"></script>

</body>
</html>
