<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UbicaMed</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="background-layer"></div>
  <div class="overlay"></div>

  <!-- Navbar fijo arriba -->
  <nav class="navbar">
    <div class="logo-container">
      <img src="images/logo.png" alt="UbicaMed Logo" class="logo-icon">
      <span class="logo-text">UbicaMed</span>
    </div>
    <div class="nav-buttons">
      <button class="btn-primary">Iniciar sesión</button>
      <button class="btn-outline">Registrarse</button>
    </div>
  </nav>

  <!-- Contenido principal -->
  <div class="container">
    <section class="hero">
      <h1 class="headline">Encuentra hospitales</h1>
      <h1 class="headline gradient">cerca de ti</h1>
      <p class="subtext">
        UbicaMed te muestra hospitales disponibles según tu EPS y tu ubicación en tiempo real
      </p>
    </section>

    <div class="cards">
      <div class="card">
        <img src="images/hospital.png" alt="Hospital Icon" class="card-icon">
        <div class="card-text">
          <h3>Hospital cercano</h3>
          <p>Menos de 2 km</p>
        </div>
      </div>
      <div class="card">
        <img src="images/ubicacion.png" alt="GPS Icon" class="card-icon">
        <div class="card-text">
          <h3>Ubicación activa</h3>
          <p>GPS habilitado</p>
        </div>
      </div>
      <div class="card">
        <img src="images/eps.png" alt="EPS Icon" class="card-icon">
        <div class="card-text">
          <h3>EPS compatible</h3>
          <p>Servicio disponible</p>
        </div>
      </div>
    </div>

    <p class="note">Activa tu ubicación para obtener resultados precisos</p>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
